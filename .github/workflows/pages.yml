name: Deploy Pages (Web)

on:
  push:
    branches:
      - main
      - preview/*
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      # Vite reads this at build time. Because GitHub Actions is the active
      # build authority for Pages, this value must be injected here.
      VITE_API_BASE: https://applied-practical-thinking.apt-account.workers.dev
    steps:
      - uses: actions/checkout@v3
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm --dir apps/web build
      - name: Publish to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: applied-practical-thinking
          directory: apps/web/dist
          branch: ${{ github.ref_name }}
