name: Deploy Worker (API)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - uses: actions/checkout@v3
      - name: Checkout apt-principles
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/apt-principles
          path: _apt-principles
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Validate project-profile.json (APT)
        run: |
          if [ -f docs/apt/references/project-profile.json ]; then
            node _apt-principles/scripts/validate-project-profile.mjs --repo-root .
          else
            echo "No project-profile.json found, skipping APT validation"
          fi
      - name: Deploy Worker
        run: |
          cd apps/worker
          pnpm exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
