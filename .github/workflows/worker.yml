name: Deploy Worker (API)

on:
  push:
    branches:
      - main
      - preview/*
  pull_request:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Install Wrangler
        run: npm install -g wrangler
      - name: Install dependencies
        run: |
          cd apps/worker
          npm install
      - name: Publish Worker
        run: |
          cd apps/worker
          wrangler publish --env ${{ github.ref_name == 'main' && 'production' || 'preview' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
